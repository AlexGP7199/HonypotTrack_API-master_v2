services:
  honeypottrack-api:
    image: moonxz/honeypottrack-api:v3 # esta la latest , v2 y v3 ( la v3 es la mas reciente y actualizada )
    container_name: honeypottrack-api
    ports:
      - "5273:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${DEFAULT_CONNECTION}
      ConnectionStrings__HoneypotConnection: ${HONEYPOT_CONNECTION}
      WatchDog__SetExternalDbConnString: ${WATCHDOG_CONNECTION}
    restart: unless-stopped

  app-tesis-frontend:
    image: moonxz/app-tesis-frontend:v2 # esta la latest y v2 ( la v2 es la mas reciente y actualizada )
    container_name: app-tesis-frontend
    ports:
      - "4200:80"
    environment:
      API_URL: ${FRONTEND_API_URL}
    depends_on:
      - honeypottrack-api
    restart: unless-stopped
